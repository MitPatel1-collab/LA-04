<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment UI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f6f9; }
        .sidebar { width: 220px; background: #2c3e50; color: white; padding: 20px; }
        .sidebar h2 { margin-bottom: 20px; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 10px; margin: 8px 0; border-radius: 6px; }
        .sidebar a:hover { background: #34495e; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .navbar { background: white; padding: 15px 20px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .navbar input { padding: 8px; width: 200px; }
        .content { padding: 20px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 3px 8px rgba(0,0,0,0.1); }
        .card h3 { margin-bottom: 10px; color: #2c3e50; }
        .card p { margin-bottom: 10px; font-size: 18px; font-weight: bold; color: #3498db; }
        .card small { color: #888; font-size: 12px; display: block; margin-bottom: 10px; }
        .btn { padding: 10px 15px; border: none; background: #3498db; color: white; border-radius: 5px; cursor: pointer; }
        .btn:hover { background: #2980b9; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; background: #2ecc71; color: white; display: inline-block; margin-bottom: 10px; }
        @media(max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>My App</h2>
        <a href="#">Dashboard</a>
        <a href="#">Analytics</a>
        <a href="#">Projects</a>
        <a href="#">Settings</a>
    </div>
    <div class="main">
        <div class="navbar">
            <h3>Dashboard</h3>
            <input type="text" placeholder="Search...">
        </div>
        <div class="content">
            <div class="cards">
                <div class="card">
                    <h3>Users</h3>
                    <p id="user-count">Loading...</p>
                    <small id="user-trend"></small>
                    <button class="btn">View</button>
                </div>
                <div class="card">
                    <h3>Projects</h3>
                    <p id="project-count">Loading...</p>
                    <small id="project-trend"></small>
                    <button class="btn">View</button>
                </div>
                <div class="card">
                    <h3>Revenue</h3>
                    <p id="revenue-amount">Loading...</p>
                    <small id="revenue-trend"></small>
                    <button class="btn">Details</button>
                </div>
                <div class="card">
                    <h3>Performance</h3>
                    <p id="perf-status">Loading...</p>
                    <small id="perf-uptime"></small>
                    <button class="btn">Check</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Backend service URL — matches Kubernetes service name
        const BACKEND_URL = 'http://flask-service:5000';

        async function fetchData() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/all`);
                const data = await res.json();

                document.getElementById('user-count').textContent = data.users.count + ' Active Users';
                document.getElementById('project-count').textContent = data.projects.count + ' Ongoing Projects';
                document.getElementById('revenue-amount').textContent = data.revenue.amount;
                document.getElementById('perf-status').textContent = data.performance.status;
                document.getElementById('perf-uptime').textContent = 'Uptime: ' + data.performance.uptime;

            } catch (err) {
                // Fallback to static data if backend unreachable
                document.getElementById('user-count').textContent = '1200 Active Users';
                document.getElementById('project-count').textContent = '45 Ongoing Projects';
                document.getElementById('revenue-amount').textContent = '$12,500';
                document.getElementById('perf-status').textContent = 'Good';
                console.log('Backend not reachable, using static data');
            }
        }

        fetchData();
    </script>
</body>
</html>
